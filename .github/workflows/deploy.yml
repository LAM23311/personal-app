name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_ENV: production

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Debug
        run: |
          ls node_modules/.bin/tailwindcss* 2>/dev/null || echo "no tailwindcss binary"
          ls node_modules/@tailwindcss/cli/ 2>/dev/null || echo "no cli package"
          node -e "try{require('@tailwindcss/cli')}catch(e){console.log('cli require failed:',e.message)}"
      - name: Build CSS
        run: npx tailwindcss -i src/app/globals.src.css -o src/app/globals.css 2>&1 || cat src/app/globals.css 2>/dev/null
      - name: Build Next.js
        run: npx next build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
